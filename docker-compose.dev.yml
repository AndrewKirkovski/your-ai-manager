version: '3.8'

services:
  luxmed-sidecar:
    build:
      context: .
      dockerfile: docker/Dockerfile.luxmed-dev
    environment:
      DB_HOST: luxmed-db
      DB_PORT: 5432
      TELEGRAM_ENABLED: "false"
      SERVER_PORT: 8080
      # Webhook URL must include ?secret=… because the bot's webhook handler
      # is fail-closed on the LUXMED_WEBHOOK_SECRET env. Same shape as prod.
      MONITORING_WEBHOOK_URL: "http://host.docker.internal:3000/api/luxmed/monitoring-callback?secret=${LUXMED_WEBHOOK_SECRET:?set LUXMED_WEBHOOK_SECRET in .env}"
      SECURITY_SECRET: "${LUXMED_SECURITY_SECRET:?set LUXMED_SECURITY_SECRET in .env}"
    ports:
      - "8080:8080"
    depends_on:
      luxmed-db:
        condition: service_healthy
    restart: unless-stopped

  luxmed-db:
    image: postgres:10.6
    environment:
      POSTGRES_USER: lbs
      POSTGRES_PASSWORD: lsb123
      POSTGRES_DB: lbs
      TZ: Europe/Warsaw
    ports:
      - "5434:5432"
    volumes:
      - luxmed-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lbs"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  luxmed-dev-postgres:
