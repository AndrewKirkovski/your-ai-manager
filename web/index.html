<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Manager - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#e2e8f0',
                            muted: '#94a3b8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .editing { background-color: #1e40af !important; }
        /* Sticker thumbnail: small by default, zoom on hover so admins can spot
           detail without clicking. transform-origin keeps the zoom anchored to
           the left so the row beside it isn't pushed around. z-index lifts the
           hovered thumb above neighbouring rows. */
        .sticker-thumb {
            transition: transform 120ms ease-out;
            transform-origin: top left;
        }
        .sticker-thumb:hover {
            transform: scale(2.5);
            z-index: 50;
            position: relative;
        }
    </style>
</head>
<body class="bg-dark-bg text-dark-text min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">AI Manager Admin</h1>
            <div class="flex items-center gap-4">
                <select id="userSelect" class="bg-dark-card border border-dark-border rounded px-3 py-2 text-sm">
                    <option value="">Select user...</option>
                </select>
                <button onclick="loadUserData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm">
                    Refresh
                </button>
            </div>
        </div>

        <!-- Token Usage (global, independent of user selection) -->
        <div id="tokenUsage" class="mb-6"></div>

        <!-- Sticker / Emoji editor (global, independent of user selection) -->
        <div id="stickerEditor" class="mb-6"></div>

        <!-- Content -->
        <div id="content" class="space-y-6">
            <p class="text-dark-muted">Select a user to view data</p>
        </div>
    </div>

    <script>
        let currentUser = null;
        let tokenState = { scope: 'global', days: 7, model: '', knownModels: [] };
        let stickerState = { kind: '', q: '', limit: 24, offset: 0, total: 0, entries: [], loading: false };

        // Load users on page load
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                const select = document.getElementById('userSelect');
                select.innerHTML = '<option value="">Select user...</option>';
                users.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.userId;
                    opt.textContent = `${u.userId} (${u.taskCount} tasks, ${u.routineCount} routines)`;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Failed to load users:', e);
            }
        }

        // ── Token usage ─────────────────────────────────────────────────────

        function fmt(n) {
            if (n == null) return '0';
            return Number(n).toLocaleString();
        }

        function fmtUsd(n) {
            if (n == null || !Number.isFinite(n)) return '$0.00';
            // 4 decimals when sub-cent so small amounts don't all collapse to $0.00
            const abs = Math.abs(n);
            const decimals = abs > 0 && abs < 0.01 ? 4 : 2;
            return '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function tokenScopeBaseParams() {
            const userId = document.getElementById('userSelect').value;
            if (tokenState.scope === 'me' && !userId) tokenState.scope = 'global';
            const params = new URLSearchParams({
                scope: tokenState.scope,
                days: String(tokenState.days),
            });
            if (tokenState.scope === 'me') params.set('user_id', userId);
            return params;
        }

        async function loadKnownModels() {
            const params = tokenScopeBaseParams();
            try {
                const res = await fetch(`/api/token-usage/models?${params}`);
                if (!res.ok) return;
                const data = await res.json();
                if (Array.isArray(data.models)) tokenState.knownModels = data.models;
            } catch (e) {
                console.error('Failed to load token-usage model list:', e);
            }
        }

        async function loadTokenUsage() {
            const params = tokenScopeBaseParams();
            if (tokenState.model) params.set('model', tokenState.model);
            try {
                const res = await fetch(`/api/token-usage?${params}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    renderTokenUsage(null, err.error || `HTTP ${res.status}`);
                    return;
                }
                const report = await res.json();
                // Only refresh the dropdown when no model filter is active — otherwise
                // by_model would only contain the filtered model and the dropdown would
                // collapse to one option.
                if (!tokenState.model) {
                    const seen = new Set([
                        ...Object.keys(report.by_model || {}),
                        ...tokenState.knownModels,
                    ]);
                    seen.delete('unknown');
                    tokenState.knownModels = [...seen].sort();
                    if (Object.keys(report.by_model || {}).includes('unknown')) {
                        tokenState.knownModels.push('unknown');
                    }
                }
                renderTokenUsage(report, null);
            } catch (e) {
                console.error('Failed to load token usage:', e);
                renderTokenUsage(null, e.message || 'fetch failed');
            }
        }

        function renderTokenUsage(report, errMsg) {
            const userId = document.getElementById('userSelect').value;
            const periods = [
                { label: 'Today', days: 1 },
                { label: '7d', days: 7 },
                { label: '30d', days: 30 },
                { label: '1y', days: 365 },
            ];
            const periodBtns = periods.map(p => `
                <button onclick="setTokenPeriod(${p.days})"
                    class="px-3 py-1 rounded text-xs ${tokenState.days === p.days ? 'bg-blue-600' : 'bg-dark-bg border border-dark-border hover:bg-dark-border'}">
                    ${p.label}
                </button>
            `).join('');

            const scopeBtns = `
                <button onclick="setTokenScope('global')"
                    class="px-3 py-1 rounded text-xs ${tokenState.scope === 'global' ? 'bg-blue-600' : 'bg-dark-bg border border-dark-border hover:bg-dark-border'}">
                    Global
                </button>
                <button onclick="setTokenScope('me')"
                    ${userId ? '' : 'disabled'}
                    class="px-3 py-1 rounded text-xs ${tokenState.scope === 'me' ? 'bg-blue-600' : 'bg-dark-bg border border-dark-border hover:bg-dark-border'} ${userId ? '' : 'opacity-50 cursor-not-allowed'}">
                    User${userId ? ` ${userId}` : ''}
                </button>
            `;

            const modelOptions = ['<option value="">All models</option>']
                .concat(tokenState.knownModels.map(m => `<option value="${escapeHtml(m)}" ${tokenState.model === m ? 'selected' : ''}>${escapeHtml(m)}</option>`))
                .join('');
            const modelSelect = `
                <select onchange="setTokenModel(this.value)"
                    class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs">
                    ${modelOptions}
                </select>
            `;

            let body;
            if (errMsg) {
                body = `<p class="text-red-400 text-sm">${escapeHtml(errMsg)}</p>`;
            } else if (!report) {
                body = `<p class="text-dark-muted text-sm">Loading…</p>`;
            } else {
                const purposeRows = Object.entries(report.by_purpose || {})
                    .sort(([, a], [, b]) => (b.input + b.output) - (a.input + a.output))
                    .map(([name, v]) => `
                        <tr class="border-b border-dark-border">
                            <td class="py-1 px-2 font-mono text-xs">${escapeHtml(name)}</td>
                            <td class="py-1 px-2 text-right">${fmt(v.input)}</td>
                            <td class="py-1 px-2 text-right">${fmt(v.output)}</td>
                            <td class="py-1 px-2 text-right">${fmt(v.input + v.output)}</td>
                            <td class="py-1 px-2 text-right text-green-400">${fmtUsd(v.cost_usd)}</td>
                            <td class="py-1 px-2 text-right text-dark-muted">${fmt(v.count)}</td>
                        </tr>
                    `).join('');

                const modelRows = Object.entries(report.by_model || {})
                    .sort(([, a], [, b]) => (b.input + b.output) - (a.input + a.output))
                    .map(([name, v]) => `
                        <tr class="border-b border-dark-border">
                            <td class="py-1 px-2 font-mono text-xs">
                                ${escapeHtml(name)}
                                ${v.priced ? '' : '<span class="ml-1 text-yellow-400 text-xs" title="No price entry in pricing.ts — cost = 0">⚠</span>'}
                            </td>
                            <td class="py-1 px-2 text-right">${fmt(v.input)}</td>
                            <td class="py-1 px-2 text-right">${fmt(v.output)}</td>
                            <td class="py-1 px-2 text-right">${fmt(v.input + v.output)}</td>
                            <td class="py-1 px-2 text-right text-green-400">${fmtUsd(v.cost_usd)}</td>
                            <td class="py-1 px-2 text-right text-dark-muted">${fmt(v.count)}</td>
                        </tr>
                    `).join('');

                // Per-day bars: only meaningful for >1 day windows
                let daySection = '';
                if (tokenState.days > 1 && report.by_day && report.by_day.length) {
                    const maxTotal = Math.max(1, ...report.by_day.map(d => d.input + d.output));
                    const dayBars = report.by_day.map(d => {
                        const total = d.input + d.output;
                        const inPct = (d.input / maxTotal) * 100;
                        const outPct = (d.output / maxTotal) * 100;
                        return `
                            <div class="flex items-center gap-2 text-xs">
                                <span class="font-mono text-dark-muted w-20 shrink-0">${d.date}</span>
                                <div class="flex-1 h-4 bg-dark-bg rounded overflow-hidden flex">
                                    <div class="bg-blue-500" style="width:${inPct}%" title="in: ${fmt(d.input)}"></div>
                                    <div class="bg-purple-500" style="width:${outPct}%" title="out: ${fmt(d.output)}"></div>
                                </div>
                                <span class="font-mono w-24 text-right shrink-0">${fmt(total)}</span>
                                <span class="font-mono w-12 text-right text-dark-muted shrink-0">${fmt(d.count)}</span>
                            </div>
                        `;
                    }).join('');
                    daySection = `
                        <div class="mt-4">
                            <div class="text-xs text-dark-muted mb-2 flex items-center gap-3">
                                <span>Per day</span>
                                <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 bg-blue-500 rounded"></span>input</span>
                                <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 bg-purple-500 rounded"></span>output</span>
                            </div>
                            <div class="space-y-1">${dayBars}</div>
                        </div>
                    `;
                }

                body = `
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">
                        <div class="bg-dark-bg rounded p-3">
                            <div class="text-xs text-dark-muted">Input</div>
                            <div class="text-lg font-semibold text-blue-400">${fmt(report.input_tokens)}</div>
                        </div>
                        <div class="bg-dark-bg rounded p-3">
                            <div class="text-xs text-dark-muted">Output</div>
                            <div class="text-lg font-semibold text-purple-400">${fmt(report.output_tokens)}</div>
                        </div>
                        <div class="bg-dark-bg rounded p-3">
                            <div class="text-xs text-dark-muted">Total</div>
                            <div class="text-lg font-semibold">${fmt(report.total_tokens)}</div>
                        </div>
                        <div class="bg-dark-bg rounded p-3">
                            <div class="text-xs text-dark-muted">Cost (≈)</div>
                            <div class="text-lg font-semibold text-green-400">${fmtUsd(report.cost_usd)}</div>
                        </div>
                        <div class="bg-dark-bg rounded p-3">
                            <div class="text-xs text-dark-muted">Requests</div>
                            <div class="text-lg font-semibold">${fmt(report.request_count)}</div>
                        </div>
                    </div>
                    ${purposeRows ? `
                        <div class="overflow-x-auto mb-4">
                            <div class="text-xs text-dark-muted mb-1">By purpose</div>
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="text-left text-dark-muted border-b border-dark-border">
                                        <th class="py-1 px-2">Purpose</th>
                                        <th class="py-1 px-2 text-right">Input</th>
                                        <th class="py-1 px-2 text-right">Output</th>
                                        <th class="py-1 px-2 text-right">Total</th>
                                        <th class="py-1 px-2 text-right w-24">Cost</th>
                                        <th class="py-1 px-2 text-right w-16">Reqs</th>
                                    </tr>
                                </thead>
                                <tbody>${purposeRows}</tbody>
                            </table>
                        </div>
                    ` : '<p class="text-dark-muted text-sm">No token usage in this window.</p>'}
                    ${modelRows ? `
                        <div class="overflow-x-auto">
                            <div class="text-xs text-dark-muted mb-1">By model <span class="text-yellow-400">⚠</span> = unpriced (no entry in pricing.ts)</div>
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="text-left text-dark-muted border-b border-dark-border">
                                        <th class="py-1 px-2">Model</th>
                                        <th class="py-1 px-2 text-right">Input</th>
                                        <th class="py-1 px-2 text-right">Output</th>
                                        <th class="py-1 px-2 text-right">Total</th>
                                        <th class="py-1 px-2 text-right w-24">Cost</th>
                                        <th class="py-1 px-2 text-right w-16">Reqs</th>
                                    </tr>
                                </thead>
                                <tbody>${modelRows}</tbody>
                            </table>
                        </div>
                    ` : ''}
                    ${daySection}
                `;
            }

            document.getElementById('tokenUsage').innerHTML = `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
                        <h2 class="text-lg font-semibold">🔥 Token Usage</h2>
                        <div class="flex flex-wrap items-center gap-2">
                            <div class="flex gap-1">${scopeBtns}</div>
                            <div class="flex gap-1">${periodBtns}</div>
                            ${modelSelect}
                        </div>
                    </div>
                    ${body}
                </div>
            `;
        }

        async function setTokenPeriod(days) {
            tokenState.days = days;
            // Period change can change which models exist in the window — refresh dropdown.
            await loadKnownModels();
            loadTokenUsage();
        }

        async function setTokenScope(scope) {
            const userId = document.getElementById('userSelect').value;
            if (scope === 'me' && !userId) return;
            tokenState.scope = scope;
            await loadKnownModels();
            loadTokenUsage();
        }

        function setTokenModel(model) {
            tokenState.model = model || '';
            loadTokenUsage();
        }

        // ── Sticker / emoji editor ──────────────────────────────────────────

        async function loadStickers(reset) {
            if (reset) stickerState.offset = 0;
            stickerState.loading = true;
            renderStickerEditor();
            const params = new URLSearchParams({
                limit: String(stickerState.limit),
                offset: String(stickerState.offset),
            });
            if (stickerState.kind) params.set('kind', stickerState.kind);
            if (stickerState.q) params.set('q', stickerState.q);
            try {
                const res = await fetch(`/api/stickers?${params}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    stickerState.entries = [];
                    stickerState.total = 0;
                    stickerState.loading = false;
                    renderStickerEditor(err.error || `HTTP ${res.status}`);
                    return;
                }
                const data = await res.json();
                stickerState.entries = data.entries || [];
                stickerState.total = data.total || 0;
                stickerState.loading = false;
                renderStickerEditor(null);
            } catch (e) {
                console.error('Failed to load stickers:', e);
                stickerState.entries = [];
                stickerState.total = 0;
                stickerState.loading = false;
                renderStickerEditor(e.message || 'fetch failed');
            }
        }

        function setStickerKind(kind) {
            stickerState.kind = kind || '';
            loadStickers(true);
        }

        function setStickerSearch(q) {
            stickerState.q = q || '';
            loadStickers(true);
        }

        function stickerPrev() {
            if (stickerState.offset === 0) return;
            stickerState.offset = Math.max(0, stickerState.offset - stickerState.limit);
            loadStickers(false);
        }

        function stickerNext() {
            if (stickerState.offset + stickerState.limit >= stickerState.total) return;
            stickerState.offset += stickerState.limit;
            loadStickers(false);
        }

        async function condenseSticker(cacheKey, btn) {
            const card = document.getElementById(`sticker-${cssEscape(cacheKey)}`);
            if (!card) return;
            const ta = card.querySelector('textarea[data-field="description"]');
            const status = card.querySelector('[data-field="status"]');
            if (!ta) return;
            const original = ta.value;
            if (!original.trim()) {
                status.textContent = 'nothing to condense';
                status.className = 'text-xs text-yellow-400';
                return;
            }
            // Disable button + textarea while we wait so the user doesn't pile
            // up requests on the same row.
            const wasDisabled = btn.disabled;
            btn.disabled = true;
            btn.textContent = '…';
            ta.disabled = true;
            status.textContent = 'condensing…';
            status.className = 'text-xs text-dark-muted';
            try {
                const res = await fetch(`/api/stickers/${encodeURIComponent(cacheKey)}/condense`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: original }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    status.textContent = '✗ ' + (err.error || `HTTP ${res.status}`);
                    status.className = 'text-xs text-red-400';
                    return;
                }
                const data = await res.json();
                ta.value = data.condensed;
                // Re-fit the textarea height to the (typically much shorter) result.
                ta.style.height = 'auto';
                ta.style.height = Math.min(ta.scrollHeight, 192) + 'px';
                status.textContent = `↓ ${original.length} → ${data.condensed.length} chars (review &amp; Save)`;
                status.className = 'text-xs text-green-400';
            } catch (e) {
                console.error('Failed to condense sticker:', e);
                status.textContent = '✗ ' + (e.message || 'fetch failed');
                status.className = 'text-xs text-red-400';
            } finally {
                btn.disabled = wasDisabled;
                btn.textContent = 'Condense';
                ta.disabled = false;
            }
        }

        async function saveSticker(cacheKey) {
            const card = document.getElementById(`sticker-${cssEscape(cacheKey)}`);
            if (!card) return;
            const desc = card.querySelector('[data-field="description"]').value;
            const tag = card.querySelector('[data-field="shortTag"]').value;
            const status = card.querySelector('[data-field="status"]');
            status.textContent = 'saving…';
            status.className = 'text-xs text-dark-muted';
            try {
                const res = await fetch(`/api/stickers/${encodeURIComponent(cacheKey)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc, shortTag: tag }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    status.textContent = '✗ ' + (err.error || `HTTP ${res.status}`);
                    status.className = 'text-xs text-red-400';
                    return;
                }
                const updated = await res.json();
                // Update local state so the corrected badge appears immediately.
                const idx = stickerState.entries.findIndex(e => e.cacheKey === cacheKey);
                if (idx >= 0) stickerState.entries[idx] = updated;
                status.textContent = '✓ saved';
                status.className = 'text-xs text-green-400';
                // Update the corrected badge in-place without redrawing the image.
                const badge = card.querySelector('[data-field="corrected-badge"]');
                if (badge) badge.classList.remove('hidden');
            } catch (e) {
                console.error('Failed to save sticker:', e);
                status.textContent = '✗ ' + (e.message || 'fetch failed');
                status.className = 'text-xs text-red-400';
            }
        }

        // CSS-safe id slug for cacheKey (cacheKey may contain colons/slashes).
        function cssEscape(s) {
            return String(s).replace(/[^a-zA-Z0-9_-]/g, c => '_' + c.charCodeAt(0).toString(16));
        }

        function stickerKindLabel(k) {
            return ({
                sticker: 'static',
                animated_sticker: 'animated',
                video_sticker: 'video',
                custom_emoji: 'emoji',
            })[k] || k;
        }

        function renderStickerCard(e) {
            const id = `sticker-${cssEscape(e.cacheKey)}`;
            // Thumbnail: ~64px square, sticker-thumb class scales it on hover.
            // Video kind embeds <video>; everything else uses <img>. Server
            // chooses the content type from magic bytes regardless of kind.
            const thumbBox = `w-16 h-16 object-contain bg-dark-bg rounded sticker-thumb`;
            const imgUrl = `/api/stickers/${encodeURIComponent(e.cacheKey)}/image`;
            let imageEl;
            if (!e.hasImage) {
                imageEl = `<div class="${thumbBox} flex items-center justify-center text-dark-muted text-[10px]">no file</div>`;
            } else if (e.kind === 'video_sticker') {
                imageEl = `<video src="${imgUrl}" class="${thumbBox}" autoplay loop muted playsinline></video>`;
            } else {
                // <img> handles PNG/WebP/JPEG/GIF and the server-rendered TGS-as-PNG.
                // Custom emojis can ALSO be WebM (animated) which <img> can't decode —
                // on error, swap to a <video> with the same src so all formats work.
                imageEl = `<img src="${imgUrl}" alt="" loading="lazy" class="${thumbBox}" onerror="(()=>{const v=document.createElement('video');v.src=this.src;v.className=this.className;v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;v.onerror=()=>v.replaceWith(Object.assign(document.createElement('div'),{className:this.className+' flex items-center justify-center text-red-400 text-[10px]',textContent:'load failed'}));this.replaceWith(v);})()">`;
            }

            const emojiCell = (e.emojis || []).map(escapeHtml).join('') || '<span class="text-dark-muted text-[10px]">—</span>';
            const correctedBadge = `<span data-field="corrected-badge" class="px-1.5 rounded bg-yellow-700 text-yellow-100 text-[10px] ${e.userCorrected ? '' : 'hidden'}" title="user-corrected">✎</span>`;
            const escKey = escapeHtml(e.cacheKey).replace(/'/g, "\\'");

            return `
                <div id="${id}" class="border-b border-dark-border py-2 flex gap-3 items-start">
                    <!-- thumbnail column, hover-zooms in place -->
                    <div class="shrink-0 w-16">${imageEl}</div>

                    <!-- content column -->
                    <div class="flex-1 min-w-0 flex flex-col gap-1">
                        <!-- meta row: emojis, kind, pack, badges, used, condense, save -->
                        <div class="flex items-center gap-2 text-xs flex-wrap">
                            <span class="text-base leading-none">${emojiCell}</span>
                            <span class="px-1.5 py-0.5 bg-dark-bg rounded text-dark-muted">${stickerKindLabel(e.kind)}</span>
                            ${e.setName ? `<span class="text-dark-muted truncate max-w-[16rem]" title="${escapeHtml(e.setName)}">${escapeHtml(e.setName)}</span>` : ''}
                            ${correctedBadge}
                            <span class="text-dark-muted ml-auto">used ${e.usedCount}×</span>
                            <span data-field="status" class="text-dark-muted"></span>
                            <button onclick="condenseSticker('${escKey}', this)"
                                title="AI-condense the description focusing on meaning, not visual detail"
                                class="bg-purple-700 hover:bg-purple-800 px-3 py-0.5 rounded">Condense</button>
                            <button onclick="saveSticker('${escKey}')"
                                class="bg-blue-600 hover:bg-blue-700 px-3 py-0.5 rounded">Save</button>
                        </div>
                        <!-- description, full-width, 2 rows tall by default — auto-grows on input -->
                        <textarea data-field="description"
                            class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs w-full resize-y min-h-[2.25rem] max-h-48 overflow-y-auto"
                            rows="2" placeholder="description"
                            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,192)+'px'">${escapeHtml(e.description || '')}</textarea>
                        <!-- short tag row -->
                        <input data-field="shortTag" type="text" value="${escapeHtml(e.shortTag || '')}"
                            class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs w-full"
                            placeholder="short tag">
                    </div>
                </div>
            `;
        }

        function renderStickerEditor(errMsg) {
            const kindOpts = [
                { value: '', label: 'All kinds' },
                { value: 'sticker', label: 'Static' },
                { value: 'animated_sticker', label: 'Animated' },
                { value: 'video_sticker', label: 'Video' },
                { value: 'custom_emoji', label: 'Custom emoji' },
            ];
            const kindSelect = `
                <select onchange="setStickerKind(this.value)"
                    class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs">
                    ${kindOpts.map(o => `<option value="${o.value}" ${stickerState.kind === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
                </select>
            `;
            const searchInput = `
                <input type="text" id="stickerSearch" value="${escapeHtml(stickerState.q)}"
                    placeholder="search description / pack / emoji…"
                    class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs w-64"
                    oninput="if(this._t)clearTimeout(this._t);this._t=setTimeout(()=>setStickerSearch(this.value),250)">
            `;

            const pageStart = stickerState.total === 0 ? 0 : stickerState.offset + 1;
            const pageEnd = Math.min(stickerState.total, stickerState.offset + stickerState.entries.length);
            const pager = `
                <div class="flex items-center gap-2 text-xs text-dark-muted">
                    <span>${pageStart}–${pageEnd} of ${stickerState.total}</span>
                    <button onclick="stickerPrev()" ${stickerState.offset === 0 ? 'disabled' : ''}
                        class="bg-dark-bg border border-dark-border rounded px-2 py-1 ${stickerState.offset === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-dark-border'}">←</button>
                    <button onclick="stickerNext()" ${(stickerState.offset + stickerState.limit) >= stickerState.total ? 'disabled' : ''}
                        class="bg-dark-bg border border-dark-border rounded px-2 py-1 ${(stickerState.offset + stickerState.limit) >= stickerState.total ? 'opacity-50 cursor-not-allowed' : 'hover:bg-dark-border'}">→</button>
                </div>
            `;

            let body;
            if (errMsg) {
                body = `<p class="text-red-400 text-sm">${escapeHtml(errMsg)}</p>`;
            } else if (stickerState.loading && stickerState.entries.length === 0) {
                body = `<p class="text-dark-muted text-sm">Loading…</p>`;
            } else if (stickerState.entries.length === 0) {
                body = `<p class="text-dark-muted text-sm">No stickers match.</p>`;
            } else {
                body = `<div class="flex flex-col">${stickerState.entries.map(renderStickerCard).join('')}</div>`;
            }

            // Preserve search input focus + caret across re-renders.
            const prevSearch = document.getElementById('stickerSearch');
            const wasFocused = prevSearch && document.activeElement === prevSearch;
            const caret = wasFocused ? prevSearch.selectionStart : null;

            document.getElementById('stickerEditor').innerHTML = `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
                        <h2 class="text-lg font-semibold">🎴 Stickers &amp; Emoji</h2>
                        <div class="flex flex-wrap items-center gap-2">
                            ${kindSelect}
                            ${searchInput}
                            ${pager}
                        </div>
                    </div>
                    ${body}
                </div>
            `;

            if (wasFocused) {
                const newSearch = document.getElementById('stickerSearch');
                if (newSearch) {
                    newSearch.focus();
                    if (caret != null) newSearch.setSelectionRange(caret, caret);
                }
            }

            // Grow each description textarea to fit its content (capped at
            // max-h-48 so a runaway description can't blow up the page).
            // Defer to rAF so flex layout has settled before scrollHeight is
            // measured — measuring during the same tick as the innerHTML write
            // gives bogus heights because the column width hasn't computed yet.
            requestAnimationFrame(() => {
                document.querySelectorAll('#stickerEditor textarea[data-field="description"]').forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = Math.min(ta.scrollHeight, 192) + 'px';
                });
            });
        }

        // Load user data
        async function loadUserData() {
            const userId = document.getElementById('userSelect').value;
            if (!userId) return;

            try {
                const res = await fetch(`/api/users/${userId}`);
                currentUser = await res.json();
                renderContent();
            } catch (e) {
                console.error('Failed to load user:', e);
            }
        }

        // Render all sections
        function renderContent() {
            if (!currentUser) return;

            document.getElementById('content').innerHTML = `
                ${renderGoal()}
                ${renderTasks()}
                ${renderRoutines()}
                ${renderStats()}
                ${renderImages()}
                ${renderMemory()}
                ${renderMessages()}
            `;

            // Auto-resize textareas after render
            setTimeout(initTextareas, 0);
        }

        // Goal section
        function renderGoal() {
            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-2">Goal</h2>
                    <p class="text-dark-muted">${currentUser.goal || 'No goal set'}</p>
                </div>
            `;
        }

        // Tasks section
        function renderTasks() {
            if (!currentUser.tasks.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">Tasks</h2>
                        <p class="text-dark-muted">No tasks</p>
                    </div>
                `;
            }

            const statusColors = {
                pending: 'bg-yellow-600',
                completed: 'bg-green-600',
                failed: 'bg-red-600',
                needs_replanning: 'bg-purple-600'
            };

            const rows = currentUser.tasks.map((t, i) => `
                <tr class="border-b border-dark-border" id="task-${t.id}">
                    <td class="py-2 px-2">
                        <span class="px-2 py-1 rounded text-xs ${statusColors[t.status] || 'bg-gray-600'}">${t.status}</span>
                    </td>
                    <td class="py-2 px-2">
                        <input type="text" value="${escapeHtml(t.name)}"
                            class="bg-transparent border-b border-transparent hover:border-dark-border focus:border-blue-500 outline-none w-full"
                            data-task-id="${t.id}" data-field="name" onchange="updateTask('${t.id}', 'name', this.value)">
                    </td>
                    <td class="py-2 px-2 text-sm text-dark-muted">
                        ${t.pingAt ? new Date(t.pingAt).toLocaleString() : '-'}
                    </td>
                    <td class="py-2 px-2">
                        <select class="bg-dark-bg border border-dark-border rounded px-2 py-1 text-xs"
                            onchange="updateTask('${t.id}', 'status', this.value)">
                            ${['pending', 'completed', 'failed', 'needs_replanning'].map(s =>
                                `<option value="${s}" ${t.status === s ? 'selected' : ''}>${s}</option>`
                            ).join('')}
                        </select>
                    </td>
                </tr>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Tasks (${currentUser.tasks.length})</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-left text-dark-muted border-b border-dark-border">
                                    <th class="py-2 px-2 w-24">Status</th>
                                    <th class="py-2 px-2">Name</th>
                                    <th class="py-2 px-2 w-40">Ping At</th>
                                    <th class="py-2 px-2 w-32">Change</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Routines section (read-only)
        function renderRoutines() {
            if (!currentUser.routines.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">Routines</h2>
                        <p class="text-dark-muted">No routines</p>
                    </div>
                `;
            }

            const rows = currentUser.routines.map(r => `
                <tr class="border-b border-dark-border">
                    <td class="py-2 px-2">
                        <span class="px-2 py-1 rounded text-xs ${r.isActive ? 'bg-green-600' : 'bg-gray-600'}">
                            ${r.isActive ? 'active' : 'inactive'}
                        </span>
                    </td>
                    <td class="py-2 px-2">${escapeHtml(r.name)}</td>
                    <td class="py-2 px-2 text-dark-muted font-mono text-xs">${r.cron}</td>
                    <td class="py-2 px-2 text-sm">
                        <span class="text-green-400">${r.stats?.completed || 0}</span> /
                        <span class="text-red-400">${r.stats?.failed || 0}</span>
                    </td>
                </tr>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Routines (${currentUser.routines.length}) <span class="text-dark-muted text-sm font-normal">read-only</span></h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-left text-dark-muted border-b border-dark-border">
                                    <th class="py-2 px-2 w-20">Status</th>
                                    <th class="py-2 px-2">Name</th>
                                    <th class="py-2 px-2 w-32">Cron</th>
                                    <th class="py-2 px-2 w-20">Stats</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Memory section
        function renderMemory() {
            const entries = Object.entries(currentUser.memory || {});
            if (!entries.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">Memory</h2>
                        <p class="text-dark-muted">No memory entries</p>
                    </div>
                `;
            }

            const rows = entries.map(([key, value]) => `
                <tr class="border-b border-dark-border">
                    <td class="py-2 px-2 font-mono text-sm text-blue-400">${escapeHtml(key)}</td>
                    <td class="py-2 px-2">
                        <input type="text" value="${escapeHtml(value)}"
                            class="bg-transparent border-b border-transparent hover:border-dark-border focus:border-blue-500 outline-none w-full"
                            onchange="updateMemory('${escapeHtml(key)}', this.value)">
                    </td>
                </tr>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Memory (${entries.length})</h2>
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-left text-dark-muted border-b border-dark-border">
                                <th class="py-2 px-2 w-40">Key</th>
                                <th class="py-2 px-2">Value</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        // Stats section (read-only)
        function renderStats() {
            if (!currentUser.stats || !currentUser.stats.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">📊 Stats</h2>
                        <p class="text-dark-muted">No stats tracked yet</p>
                    </div>
                `;
            }

            const rows = currentUser.stats.map(s => `
                <tr class="border-b border-dark-border">
                    <td class="py-2 px-2 font-medium">${escapeHtml(s.name)}</td>
                    <td class="py-2 px-2">${s.lastValue != null ? s.lastValue : '—'}${s.unit ? ' ' + escapeHtml(s.unit) : ''}</td>
                    <td class="py-2 px-2 text-dark-muted">${s.totalEntries}</td>
                    <td class="py-2 px-2 text-dark-muted text-xs">${s.lastRecorded ? new Date(s.lastRecorded).toLocaleString() : '—'}</td>
                </tr>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">📊 Stats (${currentUser.stats.length}) <span class="text-dark-muted text-sm font-normal">read-only</span></h2>
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-left text-dark-muted border-b border-dark-border">
                                <th class="py-2 px-2">Name</th>
                                <th class="py-2 px-2">Last Value</th>
                                <th class="py-2 px-2 w-20">Entries</th>
                                <th class="py-2 px-2 w-40">Last Recorded</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        // Image cache section (read-only)
        function renderImages() {
            if (!currentUser.images || !currentUser.images.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">🖼️ Recent Images</h2>
                        <p class="text-dark-muted">No cached images</p>
                    </div>
                `;
            }

            const rows = currentUser.images.map((img, i) => `
                <tr class="border-b border-dark-border">
                    <td class="py-2 px-2 text-dark-muted">${i}</td>
                    <td class="py-2 px-2 font-mono text-xs truncate max-w-[200px]">${escapeHtml(img.fileId)}</td>
                    <td class="py-2 px-2 text-sm">${escapeHtml(img.caption) || '<span class="text-dark-muted">—</span>'}</td>
                    <td class="py-2 px-2 text-sm truncate max-w-[250px]">${escapeHtml(img.description) || '—'}</td>
                    <td class="py-2 px-2 text-dark-muted text-xs">${new Date(img.timestamp).toLocaleString()}</td>
                </tr>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">🖼️ Recent Images (${currentUser.images.length}) <span class="text-dark-muted text-sm font-normal">read-only</span></h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-left text-dark-muted border-b border-dark-border">
                                    <th class="py-2 px-2 w-10">#</th>
                                    <th class="py-2 px-2">File ID</th>
                                    <th class="py-2 px-2">Caption</th>
                                    <th class="py-2 px-2">Description</th>
                                    <th class="py-2 px-2 w-36">Time</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Messages section (uses message IDs for editing)
        function renderMessages() {
            if (!currentUser.messages.length) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                        <h2 class="text-lg font-semibold mb-2">Messages</h2>
                        <p class="text-dark-muted">No messages</p>
                    </div>
                `;
            }

            const rows = currentUser.messages.map(m => `
                <div class="border-b border-dark-border py-3" id="msg-${m.id}">
                    <div class="flex items-start gap-3">
                        <span class="px-2 py-1 rounded text-xs ${m.role === 'user' ? 'bg-blue-600' : 'bg-green-600'} shrink-0">
                            ${m.role}
                        </span>
                        <div class="flex-1 min-w-0">
                            <textarea
                                class="bg-transparent border border-transparent hover:border-dark-border focus:border-blue-500 outline-none w-full resize-none rounded p-1 overflow-hidden"
                                rows="1"
                                onchange="updateMessage(${m.id}, this.value)"
                            >${escapeHtml(m.content)}</textarea>
                            <div class="text-xs text-dark-muted mt-1">
                                ${m.timestamp ? new Date(m.timestamp).toLocaleString() : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="bg-dark-card border border-dark-border rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Messages (${currentUser.messages.length})</h2>
                    <div>${rows}</div>
                </div>
            `;
        }

        // Update functions
        async function updateTask(taskId, field, value) {
            const userId = document.getElementById('userSelect').value;
            try {
                await fetch(`/api/users/${userId}/tasks/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: value })
                });
                // Update local state
                const task = currentUser.tasks.find(t => t.id === taskId);
                if (task) task[field] = value;
                showSaved(`task-${taskId}`);
            } catch (e) {
                console.error('Failed to update task:', e);
            }
        }

        async function updateMemory(key, value) {
            const userId = document.getElementById('userSelect').value;
            try {
                await fetch(`/api/users/${userId}/memory/${encodeURIComponent(key)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value })
                });
                currentUser.memory[key] = value;
            } catch (e) {
                console.error('Failed to update memory:', e);
            }
        }

        async function updateMessage(messageId, content) {
            const userId = document.getElementById('userSelect').value;
            try {
                await fetch(`/api/users/${userId}/messages/${messageId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const msg = currentUser.messages.find(m => m.id === messageId);
                if (msg) msg.content = content;
                showSaved(`msg-${messageId}`);
            } catch (e) {
                console.error('Failed to update message:', e);
            }
        }

        function showSaved(elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                el.classList.add('editing');
                setTimeout(() => el.classList.remove('editing'), 500);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // Auto-resize all textareas after render
        function initTextareas() {
            document.querySelectorAll('textarea').forEach(ta => {
                autoResize(ta);
                ta.addEventListener('input', () => autoResize(ta));
            });
        }

        // Initialize
        document.getElementById('userSelect').addEventListener('change', async () => {
            loadUserData();
            // Scope-affecting change → refresh model list + token report.
            await loadKnownModels();
            loadTokenUsage();
        });
        loadUsers();
        loadKnownModels().then(loadTokenUsage);
        loadStickers(true);
    </script>
</body>
</html>
